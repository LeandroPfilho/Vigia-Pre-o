{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h1 class="h4 mb-0">{{ titulo }}</h1>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Nome do produto</label>
                        <input type="text" name="nome" class="form-control" required value="{{ produto.nome if produto else '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">URL</label>
                        <input type="url" name="url" class="form-control" required value="{{ produto.url if produto else '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Seletor CSS do preço / caminho JSON para API</label>
                        <input type="text" name="seletor_css" class="form-control" required value="{{ produto.seletor_css if produto else '' }}" placeholder="Ex: .price ou produto.preco">
                        <div class="form-text">Para estratégia API, use caminho JSON. Exemplo: produto.preco</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estratégia de coleta</label>
                        <select name="estrategia_coleta" class="form-select">
                            {% set estrategia = produto.estrategia_coleta if produto else 'beautifulsoup' %}
                            <option value="beautifulsoup" {% if estrategia == 'beautifulsoup' %}selected{% endif %}>BeautifulSoup + Requests</option>
                            <option value="selenium" {% if estrategia == 'selenium' %}selected{% endif %}>Selenium</option>
                            <option value="api" {% if estrategia == 'api' %}selected{% endif %}>API oficial/autorizada</option>
                        </select>
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo" {% if not produto or produto.ativo %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">Produto ativo</label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('produto.listar') }}" class="btn btn-outline-secondary">Voltar</a>
                        <button class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
